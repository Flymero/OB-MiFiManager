name: Build APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiFiManager-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          body: |
            ## MiFi Manager ${{ github.ref_name }}

            ### 安装说明
            APK 未签名，安装前需要允许"未知来源"应用安装。
            如果覆盖安装失败，请先卸载旧版本再安装。

            ### 更新内容
            详见 [提交记录](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          generate_release_notes: true
