name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.11.1/bin/gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --console=plain

      - name: Prepare APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/MiFiManager-${GITHUB_REF_NAME}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiFiManager-${{ github.ref_name }}
          path: release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: MiFi Manager ${{ github.ref_name }}
          files: release/*.apk
          body: |
            ## MiFi Manager ${{ github.ref_name }}

            ### 安装说明
            APK 由 GitHub Actions 构建，并使用 Android 默认 debug 签名配置签名。

            ### 更新内容
            详见 [提交记录](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          generate_release_notes: true
